<script>
document.addEventListener("DOMContentLoaded", () => {

  const STORAGE_KEY = "hireflow_full";

  // --------------------
  // SIDEBAR NAVIGATION
  // --------------------
  document.querySelectorAll(".nav-item").forEach(item => {
    item.addEventListener("click", function(e) {
      e.preventDefault();

      document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
      this.classList.add("active");

      const text = this.textContent.trim();
      document.querySelector(".topbar-title").textContent = text;
    });
  });

  // --------------------
  // TASK TOGGLE (NO INLINE JS)
  // --------------------
  document.querySelectorAll(".task-item").forEach(item => {
    const check = item.querySelector(".task-check");
    const text = item.querySelector(".task-text");

    check.addEventListener("click", () => {
      check.classList.toggle("done");
      text.classList.toggle("done");
    });
  });

  // --------------------
  // SEARCH
  // --------------------
  const search = document.querySelector(".search-input");
  if (search) {
    search.addEventListener("input", function() {
      const val = this.value.toLowerCase();

      document.querySelectorAll(".k-card").forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(val) ? "block" : "none";
      });
    });
  }

  // --------------------
  // DRAG & DROP
  // --------------------
  let dragged = null;

  function attachDrag() {
    document.querySelectorAll(".k-card").forEach(card => {
      card.setAttribute("draggable", true);

      card.addEventListener("dragstart", () => {
        dragged = card;
        setTimeout(() => card.style.opacity = "0.5", 0);
      });

      card.addEventListener("dragend", () => {
        dragged = null;
        card.style.opacity = "1";
        saveState();
      });
    });
  }

  document.querySelectorAll(".k-col").forEach(col => {
    col.addEventListener("dragover", e => e.preventDefault());

    col.addEventListener("drop", () => {
      if (dragged) {
        col.appendChild(dragged);
        updateCounts();
        saveState();
      }
    });
  });

  // --------------------
  // UPDATE COUNTS
  // --------------------
  function updateCounts() {
    document.querySelectorAll(".k-col").forEach(col => {
      const count = col.querySelectorAll(".k-card").length;
      const counter = col.querySelector(".k-count");
      if (counter) counter.textContent = count;
    });
  }

  // --------------------
  // SAVE STATE
  // --------------------
  function saveState() {
    const data = {};

    document.querySelectorAll(".k-col").forEach(col => {
      const stage = col.querySelector(".k-col-title").textContent;
      data[stage] = [];

      col.querySelectorAll(".k-card").forEach(card => {
        data[stage].push(card.innerHTML);
      });
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // --------------------
  // LOAD STATE
  // --------------------
  function loadState() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!data) return;

    document.querySelectorAll(".k-col").forEach(col => {
      const stage = col.querySelector(".k-col-title").textContent;

      col.querySelectorAll(".k-card").forEach(c => c.remove());

      (data[stage] || []).forEach(html => {
        const div = document.createElement("div");
        div.className = "k-card";
        div.innerHTML = html;
        col.appendChild(div);
      });
    });
  }

  // --------------------
  // ADD NEW CANDIDATE
  // --------------------
  document.querySelector(".topbar-btn")?.addEventListener("click", () => {
    const name = prompt("Candidate name:");
    const role = prompt("Role:");

    if (!name || !role) return;

    const firstCol = document.querySelector(".k-col");

    const card = document.createElement("div");
    card.className = "k-card";
    card.innerHTML = `
      <div class="k-card-name">${name}</div>
      <div class="k-card-role">${role}</div>
    `;

    firstCol.appendChild(card);

    attachDrag();
    updateCounts();
    saveState();
  });

  // --------------------
  // INIT
  // --------------------
  loadState();
  attachDrag();
  updateCounts();

});
</script>
